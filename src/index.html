<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Absolute protagonist</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="pet-shell" aria-label="Absolute protagonist desktop pet">
      <section class="bubble" id="bubble" aria-live="polite"></section>
      <div class="drag-region" id="dragRegion">
        <div id="petStage" class="pet-stage">
          <img
            id="sitStool"
            class="sit-stool"
            src="./builtin-assets/chibi-wood-stool.svg"
            alt=""
            aria-hidden="true"
          />
          <img
            id="sleepBed"
            class="sleep-bed"
            src="./builtin-assets/chibi-wood-bed.svg"
            alt=""
            aria-hidden="true"
          />
          <div id="petViewport" class="pet-viewport">
            <video id="petVideo" class="pet-video" autoplay muted loop playsinline></video>
          </div>
        </div>
      </div>
    </main>
    <script src="./tauri-adapter.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
